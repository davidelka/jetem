# Sample plugin config. Copy to ~/.config/terminal/plugins.toml and fix paths.
# Plugins are explicit opt-in — nothing runs unless listed here.

# Multiplexer: Ctrl-A split/focus/close (this is the M10 dogfood — multiplexing
# lives in a plugin now, not core). Without it, the terminal has no splits.
[[plugin]]
command = "python3 /home/david/projects/terminal/examples/plugins/mux.py"

# Reacts to failed commands with a toast (event-bus demo / AI-assistant seed).
[[plugin]]
command = "python3 /home/david/projects/terminal/examples/plugins/oops.py"

# AI assistant: Ctrl-A i explains the last command via Claude.
# Backend (TERMINAL_AI_BACKEND): "cli" uses your Claude subscription via the
# `claude` CLI (no key); "api" uses the anthropic SDK (`pip install anthropic`
# + ANTHROPIC_API_KEY). Default: api if a key is set, else the claude CLI.
# [[plugin]]
# command = "python3 /home/david/projects/terminal/examples/plugins/ai.py"

# Rich output: Ctrl-A t renders the last command's output (JSON or aligned
# columns) as a table. Built on the terminal_plugin SDK (sdk/terminal_plugin.py).
# [[plugin]]
# command = "python3 /home/david/projects/terminal/examples/plugins/richout.py"

